server:
  port: 8080
  error:
    include-message: always

spring:
  application:
    name: ai-interview-platform
  datasource:
    url: ${DB_URL:jdbc:h2:mem:interviewdb;DB_CLOSE_DELAY=-1;MODE=MySQL}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}
    username: ${DB_USER:sa}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

application:
  security:
    jwt:
      # 256-bit secret key in hex format
      secret-key: ${JWT_SECRET_KEY:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      expiration: 86400000 # 24 hours in milliseconds
      refresh-token:
        expiration: 604800000 # 7 days in milliseconds

spring.ai.stt.provider: ${STT_PROVIDER:mock}
spring.ai.provider: ${AI_PROVIDER:mock}
